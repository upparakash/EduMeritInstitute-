<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EduMerit</title>
    <link rel="stylesheet" href="../public/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <h2>EduMerit Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-section="banner">
                    <i class="fas fa-image"></i> Banner Management
                </a>
                <a href="#" class="nav-item" data-section="about">
                    <i class="fas fa-info-circle"></i> About Section
                </a>
                <a href="#" class="nav-item" data-section="courses">
                    <i class="fas fa-book"></i> Courses
                </a>
                <a href="#" class="nav-item" data-section="current-affairs">
                    <i class="fas fa-newspaper"></i> Current Affairs
                </a>
                <a href="#" class="nav-item" data-section="resources">
                    <i class="fas fa-download"></i> Resources
                </a>
                <a href="#" class="nav-item" data-section="contact">
                    <i class="fas fa-envelope"></i> Contact Info
                </a>
                <a href="../index.html" target="_blank" class="nav-item">
                    <i class="fas fa-external-link-alt"></i> View Website
                </a>
                <a href="#" class="nav-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <h1><i class="fas fa-tachometer-alt"></i> Admin Dashboard</h1>
            </header>

            <div id="banner" class="section active">
                <h2>Banner Management</h2>
                <div class="banner-tabs">
                    <button class="banner-tab active" data-banner="1">Banner 1</button>
                    <button class="banner-tab" data-banner="2">Banner 2</button>
                    <button class="banner-tab" data-banner="3">Banner 3</button>
                </div>
                <form class="content-form" id="bannerForm">
                    <div class="form-group">
                        <label>Banner Image</label>
                        <input type="file" id="bannerImage" accept="image/*">
                        <small>Current: <span id="currentBannerImage">Logo/1.jpg</span></small>
                    </div>
                    <div class="form-group">
                        <label>Banner Title</label>
                        <input type="text" id="bannerTitle" value="Excellence in Education Starts Here">
                    </div>
                    <div class="form-group">
                        <label>Banner Subtitle</label>
                        <input type="text" id="bannerSubtitle" value="Empowering students with knowledge, skills and values to succeed in every field.">
                    </div>
                    <button type="submit" class="save-btn">Save Banner</button>
                </form>
            </div>

            <div id="about" class="section">
                <h2>About Section</h2>
                <form class="content-form" id="aboutForm">
                    <div class="form-group">
                        <label>About Content</label>
                        <textarea id="aboutContent" rows="6">EduMerit Institute is dedicated to providing quality education and fostering excellence in learning. We believe in nurturing talent and building future leaders.</textarea>
                    </div>
                    <button type="submit" class="save-btn">Save Changes</button>
                </form>
            </div>

            <div id="courses" class="section">
                <h2>Courses Management</h2>
                <button class="add-btn" id="addCourse">
                    <i class="fas fa-plus"></i> Add New Course
                </button>
                <div id="coursesList" class="items-list"></div>
            </div>

<div id="current-affairs" class="section">
                <h2>Current Affairs Management</h2>
                <div class="affairs-tabs">
                    <button class="affairs-tab active" data-type="daily">Daily</button>
                    <button class="affairs-tab" data-type="weekly">Weekly</button>
                    <button class="affairs-tab" data-type="monthly">Monthly</button>
                </div>
                <button class="add-btn" id="addAffair">
                    <i class="fas fa-plus"></i> Add New Current Affair
                </button>
                <div id="affairsList" class="items-list"></div>
            </div>

            <div id="resources" class="section">
                <h2>Resources Management</h2>
                <button class="add-btn" id="addResource">
                    <i class="fas fa-plus"></i> Add New Resource
                </button>
                <div id="resourcesList" class="items-list"></div>
            </div>

            <div id="contact" class="section">
                <h2>Contact Information</h2>
                <form class="content-form" id="contactForm">
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" id="contactPhone" value="+1 234 567 8900">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="contactEmail" value="info@edumerit.com">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="contactAddress" value="123 Education Street, City">
                    </div>
                    <button type="submit" class="save-btn">Save Changes</button>
                </form>
            </div>
        </main>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Add Item</h2>
            <form id="modalForm"></form>
        </div>
    </div>

    <script src="../public/js/dashboard.js"></script>
</body>
</html>
